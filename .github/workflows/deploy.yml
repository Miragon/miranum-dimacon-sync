name: Build and Push to Fly Registry

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - env: prod
            app: miranum-dimacon-sync
            org: miranum
            token_secret: FLY_TOKEN_PROD
          - env: stage
            app: miranum-dimacon-sync-stage
            org: miranum-stage
            token_secret: FLY_TOKEN_STAGE
    name: build-and-push (${{ matrix.env }})
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Create Fly app if missing
        env:
          FLY_API_TOKEN: ${{ secrets[matrix.token_secret] }}
        run: |
          if ! flyctl status -a "${{ matrix.app }}" >/dev/null 2>&1; then
            flyctl apps create "${{ matrix.app }}" --org "${{ matrix.org }}"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Fly registry
        uses: docker/login-action@v3
        with:
          registry: registry.fly.io
          username: x
          password: ${{ secrets[matrix.token_secret] }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            registry.fly.io/${{ matrix.app }}:latest
            registry.fly.io/${{ matrix.app }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.env }}
          cache-to: type=gha,mode=max,scope=${{ matrix.env }}
